services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: linux_game_compat
      POSTGRES_USER: linux_game_compat
      POSTGRES_PASSWORD: linux_game_compat_dev
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linux_game_compat -d linux_game_compat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres18-data:
